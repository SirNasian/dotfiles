fading = true;
shadow = true;

backend = "glx";
blur-method = "dual_kawase";
blur-strength = 0;

rules = (
	{ match = "focused = false", dim: 0.25 },
	{ match = "window_type ~= '(dock|dropdown_menu|menu|popup_menu|utility)'", dim: 0, shadow: false, blur-background: false },
	{ match = "class_i ~= '(rofi)'", shadow: false },
	{ match = "class_i ~= '(slop)'", blur-background: false },
	{ match = "class_i ~= '(chromium|kitty)' || class_g ~= '(firefox)'", corner-radius: 8 },
	{ match = "fullscreen", corner-radius: 0 },
);
